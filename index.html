<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameGuard - AI Security Engine</title>
    <script>
      (function() {
        try {
          var nativeFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return nativeFetch; },
            set: function(v) { console.warn('Attempted to overwrite fetch, ignoring.'); },
            configurable: true
          });
        } catch (e) {
          console.error('Failed to redefine fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
